
<div id="erd" style="padding:0.5rem 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram
  USERS ||--o{ USER_SKILLS : "has"
  SKILLS ||--o{ USER_SKILLS : "tagged by"
  USERS ||--o{ SWAP_REQUESTS : "sends"
  USERS ||--o{ SWAP_REQUESTS : "receives"
  SWAP_REQUESTS ||--o| THREADS : "opens"
  THREADS ||--o{ MESSAGES : "contains"
  USERS ||--o{ RATINGS : "gives"
  SWAP_REQUESTS ||--o{ RATINGS : "triggers"

  USERS {
    int id PK
    string name
    string email
    string password_hash
    string bio
    string location
    float avg_rating
    timestamp created_at
  }

  SKILLS {
    int id PK
    string name
    string category
  }

  USER_SKILLS {
    int id PK
    int user_id FK
    int skill_id FK
    enum type
  }

  SWAP_REQUESTS {
    int id PK
    int sender_id FK
    int receiver_id FK
    int offered_skill_id FK
    int wanted_skill_id FK
    enum status
    timestamp created_at
  }

  THREADS {
    int id PK
    int swap_id FK
    timestamp created_at
  }

  MESSAGES {
    int id PK
    int thread_id FK
    int sender_id FK
    text body
    timestamp sent_at
  }

  RATINGS {
    int id PK
    int swap_id FK
    int rater_id FK
    int ratee_id FK
    tinyint stars
    text comment
    timestamp created_at
  }
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const fp = node.querySelector('path[d]');
  if (!fp) return;
  const nums = fp.getAttribute('d').match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0],nums[2],nums[4],nums[6]], ys = [nums[1],nums[3],nums[5],nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys), w = Math.max(...xs)-x, h = Math.max(...ys)-y;
  const r = document.createElementNS('http://www.w3.org/2000/svg','rect');
  r.setAttribute('x',x); r.setAttribute('y',y); r.setAttribute('width',w); r.setAttribute('height',h); r.setAttribute('rx','8');
  for (const a of ['fill','stroke','stroke-width','class','style']) { if (fp.hasAttribute(a)) r.setAttribute(a, fp.getAttribute(a)); }
  fp.replaceWith(r);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => p.setAttribute('stroke','none'));
</script>
